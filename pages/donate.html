    <!-- DONATE SECTION -->
<div class="donate-section">
    <h1>Support Benevolent Bridges</h1>
    <p>Your contribution can make a real difference in someone’s life.</p>

    <form class="donate-form">
        <input type="text" placeholder="Your Name" required>

        <input type="email" placeholder="Your Email" required>

        <select required>
            <option value="">Select Donation Type</option>
            <option>Food</option>
            <option>Clothes</option>
            <option>Education Support</option>
            <option>Financial Help</option>
        </select>

        <textarea placeholder="Message (optional)"></textarea>

        <button type="button" onclick="thankYou()">Donate Now</button>
    </form>
</div>
<!-- FOOTER -->
<div class="footer">
    <h3>Benevolent Bridges</h3>
    <p>Connecting generosity with necessity</p>

function thankYou() {
    alert("Thank you for your kindness! Our team will contact you soon.");
}
